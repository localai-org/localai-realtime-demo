# LocalAI realtime pipeline — used by ../../docker-compose.yml.
#
# Wires Voice Activity Detection + Speech-to-Text + LLM + Text-to-Speech into a
# single model that LocalAI exposes over the realtime WebSocket API at
#   ws://localhost:8080/v1/realtime?model=gpt-realtime
#
# Each value below is the *name* of a gallery model. The compose file installs
# them from the gallery on first start (see its `command:`), so this pipeline
# resolves once they finish downloading.
name: gpt-realtime
pipeline:
  vad: silero-vad-ggml
  transcription: parakeet-cpp-tdt-0.6b-v3
  # Fast laptop-friendly defaults, matching the wingman stack. gemma-4-e2b
  # honors reasoning_effort: none (no <think> preamble); swap in lfm2.5-8b-a1b
  # for the larger chat model (it's installed by the compose `command:` too).
  llm: gemma-4-e2b-it-qat-q4_0
  # piper voice: synthesizes in ~2s vs ~16s for qwen3-tts-cpp on CPU — the TTS
  # stage is the voice-loop bottleneck. This is an Italian female voice; pick a
  # different piper voice from the gallery for another language, or swap in
  # qwen3-tts-cpp (also installed) for the neural multilingual voice.
  tts: voice-it-paola-medium

  # Keep the pipeline's LLM from emitting <think> blocks — wasteful and
  # cluttered for a voice assistant. Turn reasoning off for the pipeline's LLM:
  #
  # reasoning_effort reaches the backend's chat template (so it works for models
  # that only honor the effort level, e.g. gemma / gpt-oss / LFM2.5) and is
  # merged into LocalAI, so it works on localai/localai:latest.
  reasoning_effort: none      # none | minimal | low | medium | high
  #
  # Alternative for models that honor the enable_thinking flag (Qwen3 does):
  # sends enable_thinking=false instead of an effort level. Needs LocalAI
  # PR #10176 (https://github.com/mudler/LocalAI/pull/10176) merged.
  # disable_thinking: true
