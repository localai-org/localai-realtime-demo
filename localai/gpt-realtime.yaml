# LocalAI realtime pipeline.
#
# Wires Voice Activity Detection + Speech-to-Text + LLM + Text-to-Speech into a
# single model that LocalAI exposes over the realtime WebSocket API at
#   ws://<host>:<port>/v1/realtime?model=gpt-realtime
#
# Each value below is the *name* of another model already installed/configured
# in the same LocalAI instance. Deploy this file into the instance's models
# directory (see localai/README.md) and the four sub-models will be loaded on
# demand when a realtime session starts.
name: gpt-realtime
pipeline:
  vad: silero-vad-ggml
  transcription: parakeet-cpp-tdt-0.6b-v3
  llm: Qwen3.6-35B-A3B-Claude-4.7-Opus-Reasoning-Distilled-APEX-GGUF
  tts: qwen3-tts-cpp
