# Self-contained LocalAI realtime backend for the demo client.
#
#   docker compose up
#
# Starts LocalAI on http://localhost:8080, installs the sub-models the realtime
# pipeline needs (VAD, STT, LLM, TTS) from the gallery on first start, and
# serves the pipeline at:
#
#   ws://localhost:8080/v1/realtime?model=gpt-realtime
#
# First start downloads model weights, so give it a few minutes (watch the logs;
# `/readyz` flips healthy once it's up). Weights are cached in ./localai/models,
# so later starts are fast. Then run the client from the repo root:
#
#   go build -o assistant ./cmd/assistant && ./assistant -model gpt-realtime
#
services:
  localai:
    # CPU image. master carries the reasoning_effort->backend forwarding that
    # lets lfm2.5-8b-a1b honor "none" (PR #10184), landed after the v4.3.6
    # 'latest' tag. For NVIDIA GPUs use localai/localai:master-gpu-nvidia-cuda-12
    # (and add a `deploy.resources.reservations.devices` GPU stanza below).
    image: localai/localai:master
    container_name: localai-realtime
    ports:
      # Host port is overridable (LOCALAI_PORT) for when 8080 is already taken;
      # if you change it, point the client at it with -ws-url.
      - "${LOCALAI_PORT:-8080}:8080"
    environment:
      # Set DEBUG=true to watch model loading in detail.
      - DEBUG=false
    volumes:
      # The pipeline config (gpt-realtime.yaml) lives here; the gallery-installed
      # sub-model configs and their weights are cached here too (git-ignored).
      - ./localai/models:/models:z
    # Positional args install + load these gallery models at startup; the
    # pipeline (gpt-realtime.yaml) references them by name. Defaults match the
    # wingman stack: gemma-4-e2b for the LLM (honors reasoning_effort: none, so
    # no <think> preamble) and piper voice-it-paola-medium for TTS (~2s/utterance
    # vs ~16s for qwen3-tts-cpp on CPU). lfm2.5-8b-a1b (larger chat model) and
    # qwen3-tts-cpp (neural voice) are installed too as the heavier swap-in
    # options — point llm:/tts: in gpt-realtime.yaml at them to use them.
    command:
      - silero-vad-ggml
      - parakeet-cpp-tdt-0.6b-v3
      - gemma-4-e2b-it-qat-q4_0
      - voice-it-paola-medium
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/readyz"]
      interval: 15s
      timeout: 10s
      retries: 40
      start_period: 30s
    restart: unless-stopped
